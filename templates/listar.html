{% extends "base.html" %}

{% block content %}

<div class="criar-page">

    <h2>Meu Cronograma</h2>

    <div class="botoes">
        <a href="/cronograma/criar">
            <button class="btn-primary">Nova tarefa</button>
        </a>
    </div>

    <table>
        <thead>
            <tr>
                <th>Matéria</th>
                <th>Assunto</th>
                <th>Horário</th>
                <th>Descrição</th>
                <th>Ações</th>
            </tr>
        </thead>

        <tbody>
            {% for t in tarefas %}
            <tr>
                <td>{{ t[1] }}</td>
                <td>{{ t[2] }}</td>
                <td>{{ t[3] }}</td>
                <td>{{ t[4] }}</td>

                <td>
                    <a href="/cronograma/editar/{{ t[0] }}">Editar</a> |
                    <a href="/cronograma/remover/{{ t[0] }}">Excluir</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>

    </table>

</div>

{% endblock %}
